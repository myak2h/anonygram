services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - UPLOAD_PATH=/data/uploads
      - ALLOWED_ORIGINS=http://localhost:5173
    volumes:
      - uploads:/data/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_WS_URL: ws://localhost:8080/ws
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  uploads:
